# SonarCloud Automatic Analysis reads this file instead of Gradle's sonar block.
# The Oracle SQL resources, runtime UI/adapter entry points, and GitHub workflow
# policy files are verified by repository smoke tests, UI tests, Oracle
# integration tests, workflow-guard tests, and GitHub Actions. Keep the automatic
# analysis source scope aligned with the coverage scope; the Gradle SonarCloud
# workflow still analyzes the full Java source set.
sonar.exclusions=src/main/resources/db/oracle/schema-oracle.sql,src/main/resources/db/oracle/seed-oracle.sql,.github/workflows/*.yml,**/Main.java,**/config/ApplicationContext.java,**/config/ApplicationBootstrap.java,**/ui/**,**/persistence/DatabaseInitializer.java,**/persistence/OracleConnectionCheck.java,**/persistence/jdbc/**
sonar.cpd.exclusions=src/main/resources/db/oracle/schema-oracle.sql,src/main/resources/db/oracle/seed-oracle.sql
sonar.coverage.exclusions=**/Main.java,**/config/ApplicationContext.java,**/config/ApplicationBootstrap.java,**/ui/**,**/persistence/DatabaseInitializer.java,**/persistence/OracleConnectionCheck.java,**/persistence/jdbc/**
sonar.sourceEncoding=UTF-8
