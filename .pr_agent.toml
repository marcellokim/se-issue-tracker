[config]
response_language = "ko-KR"
use_repo_settings_file = true

[github_app]
pr_commands = [
    "/agentic_describe --config.response_language=ko-KR",
    "/agentic_review --config.response_language=ko-KR"
]
handle_push_trigger = true
push_commands = [
    "/agentic_review --config.response_language=ko-KR"
]

[review_agent]
comments_location_policy = "both"
inline_comments_severity_threshold = 3
issues_user_guidelines = """
가능한 모든 리뷰, 요약, 워크스루, 발견 사항, 권장 조치는 한국어로 작성합니다.
서비스 고정 템플릿이나 제품명이 번역되지 않는 경우에만 영어를 유지합니다.
스타일보다 실제 결함, 요구사항 누락, 테스트 누락, 권한/상태 전이 오류를 우선합니다.
"""
compliance_user_guidelines = """
응답 언어 기준:
- 가능한 모든 설명은 한국어로 작성한다.
- 코드 식별자, 파일 경로, 제품 고정 UI 문구는 원문을 유지할 수 있다.

회의 결정 기준:
- User당 직군은 하나만 가진다.
- Title/Description은 reporter만 수정 가능하며 assigned 전까지만 가능하다.
- Priority는 PL만 변경 가능하고 assigned 상태와 무관하게 변경 가능하다.
- 잘못된 fixed 처리는 tester가 dev에게 되돌릴 수 있다.
- Reopen은 PL만 가능하며 assigned부터 다시 시작한다.
- Deleted 상태와 FIFO 삭제 정책을 사용한다.
- Issue dependency를 지원한다.
"""

[checks]
enable_auto_checks_feedback = true
persistent_comment = true
final_update_message = true

[pr_reviewer]
extra_instructions = """
모든 리뷰 본문, finding 설명, 제안, 최종 업데이트 메시지는 가능한 한 한국어로 작성합니다.
코드 식별자, 파일 경로, 명령어, stack trace, 제품 고정 UI 라벨만 원문을 유지합니다.
영어 섹션 제목을 유지해야 하는 경우에도 실제 설명 문장은 한국어로 작성합니다.
"""

[pr_description]
extra_instructions = """
PR 요약, walkthrough, 변경 파일 설명, 라벨 설명은 가능한 한 한국어로 작성합니다.
코드 식별자, 파일 경로, 명령어, 제품 고정 UI 라벨만 원문을 유지합니다.
"""

[pr_code_suggestions]
extra_instructions = """
코드 제안 설명, 근거, 적용 안내는 가능한 한 한국어로 작성합니다.
코드 블록과 식별자는 원문을 유지합니다.
"""
