# Qodo/PR-Agent is intentionally disabled for this repository.
# Keep repo-settings mode so an installed GitHub App reads this file and does not run automatic PR/push reviews.

[config]
response_language = "ko-KR"
use_repo_settings_file = true

[github_app]
pr_commands = []
handle_push_trigger = false
push_commands = []

[checks]
enable_auto_checks_feedback = false
persistent_comment = false
final_update_message = false
