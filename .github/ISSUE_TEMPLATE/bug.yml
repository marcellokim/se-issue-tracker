name: 버그
description: 버그 수정 작업을 정의합니다.
title: "[버그] "
labels: ["type:bug", "priority:high"]
projects: ["marcellokim/1"]
body:
  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 어떤 문제를 해결해야 하는지 적어주세요.
      placeholder: 재현되는 문제와 영향 범위를 설명
    validations:
      required: true
  - type: dropdown
    id: impact_area
    attributes:
      label: 영향 영역
      options:
        - UI
        - 도메인 / 서비스
        - 영속 저장소
        - 통계
        - 추천
        - 자동화 / CI
    validations:
      required: true
  - type: textarea
    id: work_items
    attributes:
      label: 작업 내용
      description: 조사/수정/검증 작업을 적어주세요.
      placeholder: "- [ ] 재현\n- [ ] 원인 분석\n- [ ] 수정\n- [ ] 회귀 테스트"
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: 완료 조건
      description: 버그가 해결되었다고 판단할 기준을 적어주세요.
      placeholder: 재현 불가, 테스트 통과, 문서 반영 여부 등
    validations:
      required: true
  - type: input
    id: related_scope
    attributes:
      label: 관련 화면/클래스
      placeholder: 예) AdminPanel, FileRepository, 추천Service
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: 담당자
      placeholder: 예) marcellokim
    validations:
      required: true
  - type: input
    id: target_date
    attributes:
      label: 마감 목표
      placeholder: 예) 2026-04-10
    validations:
      required: true
