name: feature
description: feature 작업 또는 개선 작업을 정의합니다.
title: "[feature] "
labels: ["type:feature", "priority:medium"]
projects: ["marcellokim/1"]
body:
  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 이 기능이 필요한 이유를 적어주세요.
      placeholder: 사용자가 무엇을 할 수 있어야 하는지, 왜 필요한지 작성
    validations:
      required: true
  - type: dropdown
    id: issue_role
    attributes:
      label: 주요 사용자 역할
      options:
        - admin
        - PL
        - dev
        - tester
    validations:
      required: true
  - type: textarea
    id: work_items
    attributes:
      label: 작업 내용
      description: 구현해야 할 세부 작업을 적어주세요.
      placeholder: "- [ ] 모델 추가\n- [ ] 화면 연결\n- [ ] 예외 처리"
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: 완료 조건
      description: 이 이슈가 끝났다고 판단할 기준을 적어주세요.
      placeholder: 기능 동작, 테스트, 문서 반영 기준 등
    validations:
      required: true
  - type: input
    id: related_scope
    attributes:
      label: 관련 화면/클래스
      placeholder: 예) LoginView, AuthService, IssueListController
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: 담당자
      placeholder: 예) marcellokim
    validations:
      required: true
  - type: input
    id: target_date
    attributes:
      label: 마감 목표
      placeholder: 예) 2026-04-10
    validations:
      required: true
