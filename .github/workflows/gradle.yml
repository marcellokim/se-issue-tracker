name: Gradle 검증

on:
  push:
    branches: ["main", "dev", "feature/**", "docs/**", "test/**", "chore/**"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: gradle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: Gradle Wrapper 검증
        uses: gradle/actions/wrapper-validation@v6

      - name: JDK 21 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 캐시 설정
        uses: gradle/actions/setup-gradle@v6

      - name: 테스트 파이프라인 실행
        run: ./gradlew --stacktrace clean ci

      - name: 테스트 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
