name: 프로젝트 정합성 유지

on:
  issues:
    types: [opened, labeled, unlabeled, closed, reopened]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, closed]
  workflow_dispatch:
  schedule:
    - cron: "17 15 * * *"

concurrency:
  group: project-maintenance-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  project-sync:
    name: 프로젝트 상태 정렬
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: 설정 확인
        id: preflight
        env:
          PROJECT_URL: ${{ vars.PROJECT_URL }}
          ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
        run: |
          if [ -z "${PROJECT_URL}" ] || [ -z "${ADD_TO_PROJECT_PAT}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "PROJECT_URL 또는 ADD_TO_PROJECT_PAT가 없어 프로젝트 정합성 유지를 건너뜁니다."
            exit 0
          fi

          if ! graphql_remaining="$(gh api rate_limit --jq '.resources.graphql.remaining')"; then
            echo "::error::GitHub rate-limit 조회 실패. ADD_TO_PROJECT_PAT, 네트워크, GitHub API 상태를 확인하세요."
            exit 1
          fi
          if ! graphql_reset="$(gh api rate_limit --jq '.resources.graphql.reset')"; then
            echo "::error::GitHub rate-limit reset 조회 실패. ADD_TO_PROJECT_PAT, 네트워크, GitHub API 상태를 확인하세요."
            exit 1
          fi
          min_graphql_remaining=250
          if [ "${graphql_remaining}" -lt "${min_graphql_remaining}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub GraphQL 잔여량=${graphql_remaining}; 프로젝트 정합성 유지를 건너뜁니다. reset=${graphql_reset}"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: 프로젝트 상태 정렬
        if: steps.preflight.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          PROJECT_URL: ${{ vars.PROJECT_URL }}
        run: ./scripts/sync-project-board.sh --owner @me --apply --quiet

      - name: 자동화 정합성 점검
        if: steps.preflight.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          PROJECT_URL: ${{ vars.PROJECT_URL }}
        run: ./scripts/audit-project.sh --owner @me --skip-git-branches
