name: Project 정합성 유지

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened, assigned, unassigned]
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
  workflow_dispatch:
  schedule:
    - cron: "17 15 * * *"

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  project-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: 설정 확인
        id: preflight
        env:
          PROJECT_URL: ${{ vars.PROJECT_URL }}
          ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
        run: |
          if [ -z "${PROJECT_URL}" ] || [ -z "${ADD_TO_PROJECT_PAT}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "PROJECT_URL 또는 ADD_TO_PROJECT_PAT가 없어 Project 정합성 유지를 건너뜁니다."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Project 상태 정렬
        if: steps.preflight.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          PROJECT_URL: ${{ vars.PROJECT_URL }}
        run: ./scripts/sync-project-board.sh --owner @me --apply --quiet

      - name: 자동화 정합성 점검
        if: steps.preflight.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          PROJECT_URL: ${{ vars.PROJECT_URL }}
        run: ./scripts/audit-project.sh --owner @me --skip-git-branches
