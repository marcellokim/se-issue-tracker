name: SonarCloud 분석

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud 분석
    runs-on: ubuntu-latest

    steps:
      - name: 설정 확인
        id: config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud 분석을 건너뜁니다. SONAR_TOKEN secret, SONAR_ORGANIZATION variable, SONAR_PROJECT_KEY variable을 설정하세요." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 저장소 체크아웃
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: JDK 21 설정
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 캐시 설정
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v6

      - name: 테스트 및 SonarCloud 분석 실행
        if: steps.config.outputs.enabled == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: ./gradlew --stacktrace test sonar
