# Gemini Code Assist repository configuration.
# A maintainer still needs to install/enable the Gemini Code Assist GitHub App for this config to take effect.

have_fun: false
memory_config:
  disabled: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 10
  pull_request_opened:
    help: false
    summary: false
    code_review: true
    include_drafts: false
ignore_patterns:
  - "build/**"
  - ".gradle/**"
  - "docs/textbook/**"
  - "docs/superpowers/plans/**"
  - "docs/use-cases/**/*.png"
  - "docs/use-cases/**/*.svg"
