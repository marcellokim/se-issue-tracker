<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 580" font-family="'Segoe UI','Noto Sans KR',sans-serif">
  <defs>
    <style>
      .life{stroke:#000;stroke-width:1.2;stroke-dasharray:6,4}
      .msg{stroke:#000;stroke-width:1.5}
      .ret{stroke:#000;stroke-width:1;stroke-dasharray:5,3}
      .frag{fill:none;stroke:#000;stroke-width:1.3}
      .frag-lbl{font-size:11px;font-weight:700;fill:#000}
      .frag-bg{fill:#fff;stroke:#000;stroke-width:1.3}
      .frag-cond{font-size:10.5px;fill:#000}
      .op{font-size:13px;fill:#000}
      .retlbl{font-size:12px;fill:#000}
      .title{font-size:15px;font-weight:700;fill:#000;text-anchor:middle;font-style:italic}
      .box{fill:#fff;stroke:#000;stroke-width:1.5}
      .box-t{font-size:13px;text-anchor:middle;fill:#000}
    </style>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#000"/></marker>
    <marker id="ra" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#000" stroke-width="1"/></marker>
  </defs>

  <text class="title" x="425" y="25">View Issue Details Scenario</text>

  <!-- Actor -->
  <g transform="translate(140,45)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="9" x2="0" y2="28" stroke="#000" stroke-width="1.5"/>
    <line x1="-11" y1="16" x2="11" y2="16" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="-8" y2="40" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="8" y2="40" stroke="#000" stroke-width="1.5"/>
  </g>
  <text class="box-t" x="140" y="100">:Auth User</text>

  <!-- System -->
  <rect class="box" x="600" y="45" width="120" height="30"/>
  <text class="box-t" x="660" y="65">:System</text>

  <!-- Lifelines -->
  <line class="life" x1="140" y1="105" x2="140" y2="530"/>
  <line class="life" x1="660" y1="75" x2="660" y2="530"/>

  <!-- ═══ 1. viewIssueDetails ═══ -->
  <line class="msg" x1="140" y1="145" x2="658" y2="145" marker-end="url(#a)"/>
  <text class="op" x="280" y="138">viewIssueDetails(issueId)</text>

  <line class="ret" x1="658" y1="185" x2="142" y2="185" marker-end="url(#ra)"/>
  <text class="retlbl" x="260" y="180">issueDetails, comments, history, availableActions</text>

  <!-- note: availableActions는 역할+상태에 따라 다름 -->
  <rect x="665" y="145" width="170" height="46" rx="3" fill="#fff" stroke="#000" stroke-width="0.8"/>
  <text style="font-size:9.5px;fill:#000" x="672" y="159">availableActions includes:</text>
  <text style="font-size:9.5px;fill:#000" x="672" y="172">PL: assign, changeStatus, ...</text>
  <text style="font-size:9.5px;fill:#000" x="672" y="185">Dev/Tester: changeStatus, ...</text>

  <!-- ═══ 2. opt: addComment (extend UC2) ═══ -->
  <rect class="frag" x="90" y="210" width="610" height="100"/>
  <rect class="frag-bg" x="90" y="210" width="35" height="20"/>
  <text class="frag-lbl" x="97" y="225">opt</text>
  <text class="frag-cond" x="135" y="225">[Auth User가 코멘트를 남기려는 경우 — extend UC2]</text>

  <line class="msg" x1="140" y1="255" x2="658" y2="255" marker-end="url(#a)"/>
  <text class="op" x="280" y="248">addComment(issueId, content)</text>

  <line class="ret" x1="658" y1="290" x2="142" y2="290" marker-end="url(#ra)"/>
  <text class="retlbl" x="380" y="285">confirmation</text>

  <!-- ═══ 3. opt: editIssue (extend UC15) ═══ -->
  <rect class="frag" x="90" y="330" width="610" height="100"/>
  <rect class="frag-bg" x="90" y="330" width="35" height="20"/>
  <text class="frag-lbl" x="97" y="345">opt</text>
  <text class="frag-cond" x="135" y="345">[Auth User가 이슈를 수정하려는 경우 — extend UC15]</text>

  <line class="msg" x1="140" y1="375" x2="658" y2="375" marker-end="url(#a)"/>
  <text class="op" x="250" y="368">editIssue(issueId, title, description)</text>

  <line class="ret" x1="658" y1="410" x2="142" y2="410" marker-end="url(#ra)"/>
  <text class="retlbl" x="380" y="405">confirmation</text>

  <!-- ═══ Notes ═══ -->
  <text style="font-size:10px;fill:#555" x="90" y="460">System Operations:</text>
  <text style="font-size:10px;fill:#555" x="90" y="477">  • viewIssueDetails(issueId)</text>
  <text style="font-size:10px;fill:#555" x="90" y="494">  • addComment(issueId, content)  — extend UC2</text>
  <text style="font-size:10px;fill:#555" x="90" y="511">  • editIssue(issueId, title, description)  — extend UC15</text>
  <text style="font-size:10px;fill:#555" x="90" y="533">Note: UC5(Assign), UC6(Change Status)는 독립 UC — 각자 SSD에서 처리.</text>
  <text style="font-size:10px;fill:#555" x="90" y="548">UC4는 이들의 Trigger(진입 화면)이지, extend 관계가 아님.</text>
</svg>
